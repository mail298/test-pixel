<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Dungeon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a14;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
      overflow: auto;
      padding: 20px;
    }
    #game-wrapper {
      background: #13132b;
      padding: 24px;
      border-radius: 12px;
      box-shadow:
        0 0 60px rgba(59,130,246,0.12),
        0 0 120px rgba(59,130,246,0.06),
        inset 0 1px 0 rgba(255,255,255,0.05);
      border: 1px solid #1e293b;
      position: relative;
    }
    #game-wrapper::before {
      content: '';
      position: absolute;
      top: -1px; left: 25%;
      right: 25%; height: 2px;
      background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      border-radius: 2px;
    }
    #game {
      image-rendering: pixelated;
      display: block;
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    #controls-help {
      margin-top: 14px;
      display: flex;
      gap: 20px;
      justify-content: center;
      color: #475569;
      font-size: 12px;
      font-family: monospace;
    }
    #controls-help span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    kbd {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 3px;
      padding: 2px 7px;
      font-size: 11px;
      color: #94a3b8;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game"></canvas>
    <div id="controls-help">
      <span><kbd>&uarr;</kbd><kbd>&darr;</kbd><kbd>&larr;</kbd><kbd>&rarr;</kbd> Move</span>
      <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move</span>
      <span><kbd>Space</kbd> Start / Restart</span>
    </div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
